<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>St Isidore</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
      }
      main {
        max-width: 720px;
        width: 100%;
        border: 1px solid #d9d9d9;
        border-radius: 12px;
        padding: 28px;
        box-sizing: border-box;
      }
      h1 {
        margin-top: 0;
      }
      p {
        line-height: 1.6;
      }
      code {
        background: #f3f3f3;
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Site is live on Netlify</h1>
      <p>
        Your deployment is now serving <code>index.html</code>, which is required for
        Netlify static hosting.
      </p>
      <p>
        Note: Netlify does not run PHP directly. If you need dynamic PHP behavior,
        move to a PHP-compatible host.
      </p>
    </main>
  </body>
</html>
